<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zerics</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@200;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --card: #121215;
    --card-edge: rgba(255, 255, 255, .06);
    --card-edge-hover: rgba(255, 255, 255, .14);
    --ink: #f4f4f5;
    --muted: #9d9da6;
    --dim: #5b5b64;
    --ice: #a8c7e8;
    --radius: 22px;
    --font: 'Geist', system-ui, -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    font-weight: 400;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 1.4rem 1.1rem 2rem;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: .9rem; }

  /* ---------- Header ---------- */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .3rem .4rem 1rem;
  }
  .brand { display: flex; align-items: center; gap: .65rem; }
  .brand img {
    height: 28px; width: 28px;
    mix-blend-mode: screen;
    object-fit: contain;
  }
  .brand span {
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: .3em;
    text-transform: uppercase;
  }
  #clock {
    font-size: .95rem;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    color: var(--dim);
  }

  /* ---------- Karten ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: var(--radius);
    padding: 1.5rem 1.6rem;
    transition: border-color .2s;
  }

  .grid2 { display: grid; grid-template-columns: 1fr; gap: .9rem; }
  @media (min-width: 720px) { .grid2 { grid-template-columns: 1fr 1fr; } }

  .cardlabel {
    font-size: .74rem;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* ---------- Wetter Hero ---------- */
  .hero .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }
  .hero .temp {
    font-size: clamp(4rem, 13vw, 5.6rem);
    font-weight: 200;
    line-height: 1;
    letter-spacing: -.035em;
    margin-top: .5rem;
  }
  .hero .cond { color: var(--muted); font-size: 1rem; margin-top: .2rem; }
  .hero .side {
    text-align: right;
    font-size: .82rem;
    color: var(--dim);
    line-height: 1.9;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .hero .side b { color: var(--muted); font-weight: 500; }

  .forecast {
    display: flex;
    margin-top: 1.4rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--card-edge);
  }
  .forecast .day {
    flex: 1;
    text-align: center;
    font-size: .75rem;
    color: var(--dim);
  }
  .forecast .sym { font-size: 1rem; color: var(--muted); margin: .3rem 0 .15rem; }
  .forecast b { color: var(--ink); font-weight: 500; }

  /* ---------- Bihać kompakt ---------- */
  .mini { display: flex; flex-direction: column; gap: .9rem; }
  .mini .row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 1rem;
  }
  .mini .temp {
    font-size: 3rem;
    font-weight: 200;
    line-height: 1;
    letter-spacing: -.03em;
  }
  .mini .cond { color: var(--muted); font-size: .9rem; margin-top: .3rem; }
  .mini .side {
    text-align: right;
    font-size: .82rem;
    color: var(--dim);
    line-height: 1.9;
    font-variant-numeric: tabular-nums;
  }
  .mini .side b { color: var(--muted); font-weight: 500; }

  /* ---------- Sprit ---------- */
  .fuelhead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: .9rem;
  }
  .seg {
    display: flex;
    background: rgba(255, 255, 255, .06);
    border-radius: 999px;
    padding: 3px;
  }
  .seg button {
    border: 0;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: .8rem;
    font-weight: 500;
    padding: .38rem .95rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background .18s, color .18s;
  }
  .seg button.active { background: var(--ink); color: #0a0a0c; }

  .station {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding: .72rem 0;
    border-bottom: 1px solid var(--card-edge);
  }
  .station:last-of-type { border-bottom: 0; padding-bottom: 0; }
  .station .n { font-weight: 500; }
  .station .addr { color: var(--dim); font-size: .76rem; }
  .station .price {
    font-size: 1.15rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    letter-spacing: -.01em;
  }
  .station .price small { font-size: .62em; color: var(--dim); font-weight: 400; }
  .station.best .price { color: var(--ice); }

  .attribution { color: var(--dim); font-size: .72rem; margin-top: 1rem; }

  /* ---------- Spiele ---------- */
  a.game {
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  a.game:hover { border-color: var(--card-edge-hover); }
  .game .t { font-size: 1.05rem; font-weight: 600; letter-spacing: -.01em; }
  .game .s { color: var(--dim); font-size: .8rem; margin-top: .15rem; }
  .game .arrow {
    color: var(--dim);
    font-size: 1.2rem;
    transition: transform .2s, color .2s;
  }
  a.game:hover .arrow { transform: translateX(4px); color: var(--ice); }

  /* ---------- Abschluss ---------- */
  .mark {
    display: block;
    width: min(200px, 50%);
    margin: 2.2rem auto 0;
    mix-blend-mode: screen;
    opacity: .14;
  }

  footer {
    text-align: center;
    color: var(--dim);
    font-size: .72rem;
    margin-top: .8rem;
  }

  .loading { color: var(--dim); }
  .error { color: #c08a83; font-size: .9rem; }
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="brand">
    <img src="/favicon.png" alt="">
    <span>zerics</span>
  </div>
  <div id="clock">--:--:--</div>
</header>

<section class="card hero" id="card-erbach"><div class="loading">Lade…</div></section>

<section class="card mini" id="card-bihac"><div class="loading">Lade…</div></section>

<section class="card" id="card-fuel"></section>

<div class="grid2">
  <a class="card game" href="/2048.html">
    <span>
      <span class="t">2048</span>
      <span class="s" style="display:block">Wischen, verschmelzen, Rekord jagen</span>
    </span>
    <span class="arrow">→</span>
  </a>
  <a class="card game" href="/fight.html">
    <span>
      <span class="t">Yessin vs Alex</span>
      <span class="s" style="display:block">Kanu gegen Automat — gegen den Computer</span>
    </span>
    <span class="arrow">→</span>
  </a>
</div>

<img class="mark" src="/logo.png" alt="">

<footer>
  Wetter: open-meteo.com · Sprit: Tankerkönig / MTS-K (CC BY 4.0) · aktualisiert alle 15 Min.
</footer>

</div>

<script>
const SYM = { sun: '\u2600\uFE0E', cloud: '\u2601\uFE0E', rain: '\u2602\uFE0E', snow: '\u2744\uFE0E', bolt: '\u26A1\uFE0E' };

const WMO = {
  0:[SYM.sun,'Klar'],1:[SYM.sun,'Überw. klar'],2:[SYM.cloud,'Teils bewölkt'],3:[SYM.cloud,'Bedeckt'],
  45:[SYM.cloud,'Nebel'],48:[SYM.cloud,'Reifnebel'],
  51:[SYM.rain,'Leichter Niesel'],53:[SYM.rain,'Niesel'],55:[SYM.rain,'Starker Niesel'],
  61:[SYM.rain,'Leichter Regen'],63:[SYM.rain,'Regen'],65:[SYM.rain,'Starkregen'],
  66:[SYM.rain,'Gefr. Regen'],67:[SYM.rain,'Gefr. Regen'],
  71:[SYM.snow,'Leichter Schnee'],73:[SYM.snow,'Schnee'],75:[SYM.snow,'Starker Schnee'],77:[SYM.snow,'Schneegriesel'],
  80:[SYM.rain,'Leichte Schauer'],81:[SYM.rain,'Schauer'],82:[SYM.bolt,'Starke Schauer'],
  85:[SYM.snow,'Schneeschauer'],86:[SYM.snow,'Schneeschauer'],
  95:[SYM.bolt,'Gewitter'],96:[SYM.bolt,'Gewitter + Hagel'],99:[SYM.bolt,'Schweres Gewitter'],
};
const wmo = c => WMO[c] || [SYM.cloud, 'Wetter'];

const aqiText = v =>
  v == null ? null :
  v <= 20 ? 'gut' : v <= 40 ? 'okay' : v <= 60 ? 'mäßig' : v <= 80 ? 'schlecht' : 'sehr schlecht';

function fmtTime(iso, tz) {
  return new Date(iso).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: tz });
}

async function fetchCity(lat, lon, tz) {
  const wURL = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset`
    + `&timezone=${encodeURIComponent(tz)}&forecast_days=5`;
  const aURL = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi`;
  const [w, a] = await Promise.all([
    fetch(wURL).then(r => r.json()),
    fetch(aURL).then(r => r.json()).catch(() => null),
  ]);
  return { w, aqi: a?.current?.european_aqi ?? null };
}

async function loadErbach() {
  const el = document.getElementById('card-erbach');
  try {
    const { w, aqi } = await fetchCity(49.6558, 8.9944, 'Europe/Berlin');
    const cur = w.current, d = w.daily;
    const [, desc] = wmo(cur.weather_code);

    const days = d.time.map((t, i) => {
      const [sym] = wmo(d.weather_code[i]);
      const label = i === 0 ? 'Heute' : new Date(t).toLocaleDateString('de-DE', { weekday: 'short' });
      return `<div class="day">${label}<div class="sym">${sym}</div><b>${Math.round(d.temperature_2m_max[i])}°</b> ${Math.round(d.temperature_2m_min[i])}°</div>`;
    }).join('');

    el.innerHTML = `
      <div class="top">
        <div>
          <div class="cardlabel">Erbach · Odenwald</div>
          <div class="temp">${Math.round(cur.temperature_2m)}°</div>
          <div class="cond">${desc} · gefühlt ${Math.round(cur.apparent_temperature)}°</div>
        </div>
        <div class="side">
          Wind <b>${Math.round(cur.wind_speed_10m)} km/h</b><br>
          Feuchte <b>${cur.relative_humidity_2m}%</b><br>
          ${aqi != null ? `Luft <b>${aqiText(aqi)}</b><br>` : ''}
          ↑ <b>${fmtTime(d.sunrise[0], 'Europe/Berlin')}</b> · ↓ <b>${fmtTime(d.sunset[0], 'Europe/Berlin')}</b>
        </div>
      </div>
      <div class="forecast">${days}</div>`;
  } catch {
    el.innerHTML = '<div class="cardlabel">Erbach</div><div class="error">Daten konnten nicht geladen werden.</div>';
  }
}

async function loadBihac() {
  const el = document.getElementById('card-bihac');
  try {
    const { w } = await fetchCity(44.8169, 15.8708, 'Europe/Sarajevo');
    const cur = w.current, d = w.daily;
    const [, desc] = wmo(cur.weather_code);

    el.innerHTML = `
      <div class="cardlabel">Bihać · Bosnien</div>
      <div class="row">
        <div>
          <div class="temp">${Math.round(cur.temperature_2m)}°</div>
          <div class="cond">${desc} · ${Math.round(d.temperature_2m_max[0])}° / ${Math.round(d.temperature_2m_min[0])}° heute</div>
        </div>
        <div class="side">
          <b><span class="tz" data-tz="Europe/Sarajevo">--:--</span></b> Ortszeit<br>
          ↑ <b>${fmtTime(d.sunrise[0], 'Europe/Sarajevo')}</b> · ↓ <b>${fmtTime(d.sunset[0], 'Europe/Sarajevo')}</b>
        </div>
      </div>`;
  } catch {
    el.innerHTML = '<div class="cardlabel">Bihać</div><div class="error">Daten konnten nicht geladen werden.</div>';
  }
}

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.querySelectorAll('.tz').forEach(s => {
    s.textContent = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: s.dataset.tz });
  });
}

/* ---------- Sprit ---------- */

let currentFuel = 'e5';

function renderFuelCard() {
  const el = document.getElementById('card-fuel');
  el.innerHTML = `
    <div class="fuelhead">
      <span class="cardlabel">Sprit · Erbach, 5 km</span>
      <span class="seg">
        <button class="active" data-fuel="e5">E5</button>
        <button data-fuel="e10">E10</button>
        <button data-fuel="diesel">Diesel</button>
      </span>
    </div>
    <div id="fuel-stations"></div>
    <div class="attribution" id="fuel-attribution"></div>`;

  el.querySelectorAll('.seg button').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFuel = btn.dataset.fuel;
      el.querySelectorAll('.seg button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadFuel();
    });
  });
}

async function loadFuel() {
  const box = document.getElementById('fuel-stations');
  box.innerHTML = '<div class="loading">Lade…</div>';
  try {
    const res = await fetch('/api/fuel-prices?fuel=' + currentFuel + '&radius=5');
    const data = await res.json();

    if (!data.ok) {
      box.innerHTML = '<div class="loading">Noch nicht verfügbar.</div>';
      return;
    }

    const stations = data.stations.filter(s => s.price != null).slice(0, 6);
    const rows = stations
      .map((s, i) => `
        <div class="station${i === 0 ? ' best' : ''}">
          <div>
            <div class="n">${s.name}</div>
            <div class="addr">${s.street}, ${s.place} · ${s.distKm} km</div>
          </div>
          <div class="price">${s.price.toFixed(3)}<small> €/L</small></div>
        </div>`)
      .join('');

    box.innerHTML = rows || '<div class="loading">Keine Preise gerade verfügbar.</div>';
    document.getElementById('fuel-attribution').textContent = data.attribution;
  } catch {
    box.innerHTML = '<div class="error">Daten konnten nicht geladen werden.</div>';
  }
}

/* ---------- Start ---------- */

loadErbach();
loadBihac();
setInterval(() => { loadErbach(); loadBihac(); }, 15 * 60 * 1000);

tick();
setInterval(tick, 1000);

renderFuelCard();
loadFuel();
setInterval(loadFuel, 15 * 60 * 1000);
</script>
</body>
</html>
