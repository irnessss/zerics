<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zerics — Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background:#0f0f0f; color:#e8e8e8;
    min-height:100vh; padding:1rem;
  }
  .wrap { max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:1rem; }
  header { display:flex; justify-content:space-between; align-items:baseline; padding:.5rem 0; }
  h1 { font-size:1rem; letter-spacing:.25em; color:#666; text-transform:uppercase; }
  #clock { font-size:1.4rem; font-weight:600; font-variant-numeric:tabular-nums; }

  .grid { display:grid; grid-template-columns:1fr; gap:1rem; }
  @media (min-width:700px) { .grid { grid-template-columns:1fr 1fr; } }

  .card {
    background:#1a1a1a; border:1px solid #262626; border-radius:14px;
    padding:1.2rem; display:flex; flex-direction:column; gap:.9rem;
  }
  .city { display:flex; justify-content:space-between; align-items:baseline; }
  .city h2 { font-size:1.1rem; }
  .tz { color:#777; font-size:.85rem; font-variant-numeric:tabular-nums; }

  .now { display:flex; align-items:center; gap:1rem; }
  .now .icon { font-size:3rem; line-height:1; }
  .now .temp { font-size:2.6rem; font-weight:700; }
  .now .desc { color:#999; font-size:.9rem; }

  .facts { display:grid; grid-template-columns:repeat(2,1fr); gap:.5rem .8rem; font-size:.85rem; }
  .facts div { color:#aaa; }
  .facts b { color:#e8e8e8; font-weight:600; }

  .aqi { display:inline-block; padding:.1rem .5rem; border-radius:6px; font-weight:600; }

  .days { display:flex; gap:.4rem; }
  .day {
    flex:1; background:#222; border-radius:8px; padding:.5rem .2rem;
    text-align:center; font-size:.75rem; color:#999;
  }
  .day .di { font-size:1.2rem; margin:.2rem 0; }
  .day b { color:#e8e8e8; }

  .error { color:#e07a7a; font-size:.9rem; }

  a.card { text-decoration:none; color:inherit; transition:border-color .15s; }
  a.card:hover { border-color:#444; }
  .gamecard { flex-direction:row; align-items:center; justify-content:space-between; }
  .gamecard .t { font-size:1.1rem; font-weight:600; }
  .gamecard .s { color:#777; font-size:.85rem; margin-top:.2rem; }
  .gamecard .arrow { font-size:1.5rem; color:#666; }

  footer { text-align:center; color:#555; font-size:.75rem; padding:.5rem 0; }
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1>zerics</h1>
  <div id="clock">--:--</div>
</header>

<div class="grid">
  <div class="card" id="card-erbach"></div>
  <div class="card" id="card-bihac"></div>
</div>
<div class="card" id="card-fuel"></div>
<a class="card gamecard" href="/2048.html">
  <div>
    <div class="t">2048 spielen</div>
    <div class="s">Der Klassiker — wischen und verschmelzen</div>
  </div>
  <div class="arrow">→</div>
</a>

 <a class="card gamecard" href="/fight.html">
  <div>
    <div class="t">Yessen vs Alex</div>
    <div class="s">Der Klassiker — wischen und verschmelzen</div>
  </div>
  <div class="arrow">→</div>
</a>

<footer>Wetterdaten: open-meteo.com · aktualisiert alle 15 Min.</footer>

</div>

<script>
const CITIES = [
  { id:'card-erbach', name:'Erbach', sub:'Odenwald · DE', lat:49.6558, lon:8.9944, tz:'Europe/Berlin' },
  { id:'card-bihac',  name:'Bihać',  sub:'Bosnien',       lat:44.8169, lon:15.8708, tz:'Europe/Sarajevo' },
];

const WMO = {
  0:['☀️','Klar'],1:['🌤️','Überw. klar'],2:['⛅','Teils bewölkt'],3:['☁️','Bedeckt'],
  45:['🌫️','Nebel'],48:['🌫️','Reifnebel'],
  51:['🌦️','Leichter Niesel'],53:['🌦️','Niesel'],55:['🌧️','Starker Niesel'],
  61:['🌧️','Leichter Regen'],63:['🌧️','Regen'],65:['🌧️','Starkregen'],
  66:['🌧️','Gefr. Regen'],67:['🌧️','Gefr. Regen'],
  71:['🌨️','Leichter Schnee'],73:['🌨️','Schnee'],75:['❄️','Starker Schnee'],77:['❄️','Schneegriesel'],
  80:['🌦️','Leichte Schauer'],81:['🌧️','Schauer'],82:['⛈️','Starke Schauer'],
  85:['🌨️','Schneeschauer'],86:['🌨️','Schneeschauer'],
  95:['⛈️','Gewitter'],96:['⛈️','Gewitter + Hagel'],99:['⛈️','Schweres Gewitter'],
};
const wmo = c => WMO[c] || ['🌡️','—'];

function aqiInfo(v) {
  if (v == null) return ['—','#333'];
  if (v <= 20) return ['gut','#2d6a3f'];
  if (v <= 40) return ['okay','#5a7a2d'];
  if (v <= 60) return ['mäßig','#8a7a25'];
  if (v <= 80) return ['schlecht','#96421f'];
  return ['sehr schlecht','#a33418'];
}

function fmtTime(iso, tz) {
  return new Date(iso).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',timeZone:tz});
}

async function loadCity(c) {
  const el = document.getElementById(c.id);
  el.innerHTML = '<div class="city"><h2>'+c.name+'</h2></div><div style="color:#777">Lade…</div>';
  try {
    const wURL = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset`
      + `&timezone=${encodeURIComponent(c.tz)}&forecast_days=5`;
    const aURL = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${c.lat}&longitude=${c.lon}&current=european_aqi`;

    const [w, a] = await Promise.all([
      fetch(wURL).then(r => r.json()),
      fetch(aURL).then(r => r.json()).catch(() => null),
    ]);

    const cur = w.current, d = w.daily;
    const [ic, desc] = wmo(cur.weather_code);
    const aqiVal = a?.current?.european_aqi;
    const [aqiTxt, aqiCol] = aqiInfo(aqiVal);

    const days = d.time.map((t,i) => {
      const [di] = wmo(d.weather_code[i]);
      const label = i===0 ? 'Heute' : new Date(t).toLocaleDateString('de-DE',{weekday:'short'});
      return `<div class="day">${label}<div class="di">${di}</div><b>${Math.round(d.temperature_2m_max[i])}°</b> ${Math.round(d.temperature_2m_min[i])}°</div>`;
    }).join('');

    el.innerHTML = `
      <div class="city"><h2>${c.name} <span style="color:#666;font-size:.8rem">${c.sub}</span></h2>
        <span class="tz" data-tz="${c.tz}">--:--</span></div>
      <div class="now">
        <div class="icon">${ic}</div>
        <div>
          <div class="temp">${Math.round(cur.temperature_2m)}°C</div>
          <div class="desc">${desc} · gefühlt ${Math.round(cur.apparent_temperature)}°</div>
        </div>
      </div>
      <div class="facts">
        <div>Wind <b>${Math.round(cur.wind_speed_10m)} km/h</b></div>
        <div>Feuchte <b>${cur.relative_humidity_2m}%</b></div>
        <div>Sonne ↑ <b>${fmtTime(d.sunrise[0], c.tz)}</b></div>
        <div>Sonne ↓ <b>${fmtTime(d.sunset[0], c.tz)}</b></div>
        <div>Luft <span class="aqi" style="background:${aqiCol}">${aqiVal != null ? Math.round(aqiVal)+' · '+aqiTxt : '—'}</span></div>
      </div>
      <div class="days">${days}</div>`;
  } catch (e) {
    el.innerHTML = '<div class="city"><h2>'+c.name+'</h2></div><div class="error">Daten konnten nicht geladen werden.</div>';
  }
}

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.querySelectorAll('.tz').forEach(s => {
    s.textContent = now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',timeZone:s.dataset.tz});
  });
}

let currentFuel = 'e5';

async function loadFuel() {
  const el = document.getElementById('card-fuel');
  const stationsBox = el.querySelector('#fuel-stations') || el;
  stationsBox.innerHTML = '<div style="color:#777">Lade…</div>';

  try {
    const res = await fetch('/api/fuel-prices?fuel=' + currentFuel + '&radius=5');
    const data = await res.json();

    if (!data.ok) {
      stationsBox.innerHTML = '<div style="color:#777">Noch nicht verfügbar.</div>';
      return;
    }

    const rows = data.stations
      .filter(s => s.price != null)
      .slice(0, 6)
      .map(s => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid #262626">
          <div>
            <div>${s.name}</div>
            <div style="color:#666;font-size:.75rem">${s.street}, ${s.place} · ${s.distKm} km</div>
          </div>
          <b style="font-size:1.05rem">${s.price.toFixed(3)} €</b>
        </div>`)
      .join('');

    stationsBox.innerHTML = rows || '<div style="color:#777">Keine Preise gerade verfügbar.</div>';
    document.getElementById('fuel-attribution').textContent = data.attribution;
  } catch {
    stationsBox.innerHTML = '<div class="error">Daten konnten nicht geladen werden.</div>';
  }
}

function renderFuelCard() {
  const el = document.getElementById('card-fuel');
  el.innerHTML = `
    <div class="city">
      <h2>Sprit <span style="color:#666;font-size:.8rem">Erbach, 5 km</span></h2>
    </div>
    <div id="fuel-tabs" style="display:flex;gap:.4rem;margin:.3rem 0 .2rem">
      <button data-fuel="e5" class="fuel-tab">E5</button>
      <button data-fuel="e10" class="fuel-tab">E10</button>
      <button data-fuel="diesel" class="fuel-tab">Diesel</button>
    </div>
    <div id="fuel-stations"></div>
    <div id="fuel-attribution" style="color:#555;font-size:.75rem;margin-top:.5rem"></div>`;

  document.querySelectorAll('.fuel-tab').forEach(btn => {
    btn.style.cssText = 'flex:1;padding:.4rem;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#ccc;cursor:pointer;font:inherit';
    btn.addEventListener('click', () => {
      currentFuel = btn.dataset.fuel;
      document.querySelectorAll('.fuel-tab').forEach(b => b.style.background = '#1a1a1a');
      btn.style.background = '#333';
      loadFuel();
    });
  });
  document.querySelector('.fuel-tab[data-fuel="e5"]').style.background = '#333';
}

renderFuelCard();
loadFuel();
setInterval(loadFuel, 15 * 60 * 1000);
}
loadFuel();
setInterval(loadFuel, 15*60*1000);
</script>
</body>
</html>
