<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>zerics — 2048</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background:#0f0f0f; color:#e8e8e8;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    user-select:none; touch-action:none; padding:1rem; gap:1rem;
  }
  header { width:100%; max-width:400px; display:flex; justify-content:space-between; align-items:center; }
  h1 { font-size:1rem; letter-spacing:.2em; color:#666; text-transform:uppercase; }
  .scores { display:flex; gap:.5rem; }
  .score { background:#1e1e1e; border-radius:8px; padding:.4rem .8rem; text-align:center; min-width:70px; }
  .score span { display:block; font-size:.6rem; color:#777; letter-spacing:.1em; text-transform:uppercase; }
  .score b { font-size:1.1rem; }

  #board {
    background:#1a1a1a; border-radius:10px; padding:8px;
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
    width:min(90vw, 400px); aspect-ratio:1;
  }
  .cell {
    background:#242424; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:clamp(1rem, 6vw, 2rem);
    transition: transform .1s;
  }
  .new { animation:pop .15s ease; }
  @keyframes pop { from { transform:scale(.5); } to { transform:scale(1); } }

  .v2    { background:#3a3730; color:#bbb; }
  .v4    { background:#413c30; color:#ccc; }
  .v8    { background:#7a4a28; color:#fff; }
  .v16   { background:#8a5024; color:#fff; }
  .v32   { background:#96421f; color:#fff; }
  .v64   { background:#a33418; color:#fff; }
  .v128  { background:#9b8d3a; color:#fff; font-size:clamp(.9rem,5vw,1.7rem); }
  .v256  { background:#a09033; color:#fff; font-size:clamp(.9rem,5vw,1.7rem); }
  .v512  { background:#a5932b; color:#fff; font-size:clamp(.9rem,5vw,1.7rem); }
  .v1024 { background:#aa9522; color:#fff; font-size:clamp(.7rem,4vw,1.4rem); }
  .v2048 { background:#b09800; color:#fff; font-size:clamp(.7rem,4vw,1.4rem); box-shadow:0 0 20px #b0980066; }
  .big   { background:#2d2a4a; color:#fff; font-size:clamp(.7rem,4vw,1.4rem); }

  #msg {
    position:fixed; inset:0; background:#0f0f0fe6;
    display:none; flex-direction:column; align-items:center; justify-content:center; gap:1rem;
  }
  #msg.show { display:flex; }
  #msg h2 { font-size:2rem; }
  button {
    background:#e8e8e8; color:#0f0f0f; border:none; border-radius:8px;
    padding:.7rem 1.5rem; font-size:1rem; font-weight:600; cursor:pointer;
    font-family:inherit;
  }
  footer { color:#555; font-size:.8rem; text-align:center; }
</style>
</head>
<body>

<header>
  <h1>zerics</h1>
  <div class="scores">
    <div class="score"><span>Score</span><b id="score">0</b></div>
    <div class="score"><span>Best</span><b id="best">0</b></div>
  </div>
</header>

<div id="board"></div>

<footer>Wischen oder Pfeiltasten</footer>

<div id="msg">
  <h2 id="msgText">Game Over</h2>
  <button id="restart">Neues Spiel</button>
</div>

<script>
const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const msgEl   = document.getElementById('msg');
const msgText = document.getElementById('msgText');

let grid, score = 0, best = 0, won = false;

function init() {
  grid = Array.from({length:4}, () => Array(4).fill(0));
  score = 0; won = false;
  msgEl.classList.remove('show');
  addTile(); addTile();
  draw();
}

function addTile() {
  const empty = [];
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!grid[r][c]) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  return [r,c];
}

function draw(newPos) {
  boardEl.innerHTML = '';
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    const v = grid[r][c];
    const d = document.createElement('div');
    d.className = 'cell';
    if (v) {
      d.textContent = v;
      d.classList.add(v <= 2048 ? 'v'+v : 'big');
      if (newPos && newPos[0]===r && newPos[1]===c) d.classList.add('new');
    }
    boardEl.appendChild(d);
  }
  scoreEl.textContent = score;
  if (score > best) best = score;
  bestEl.textContent = best;
}

function slide(row) {
  let arr = row.filter(v => v);
  for (let i=0;i<arr.length-1;i++) {
    if (arr[i] === arr[i+1]) {
      arr[i] *= 2;
      score += arr[i];
      if (arr[i] === 2048 && !won) { won = true; msgText.textContent = 'Gewonnen! 🎉'; msgEl.classList.add('show'); }
      arr.splice(i+1,1);
    }
  }
  while (arr.length < 4) arr.push(0);
  return arr;
}

function rotate(g) {
  return g[0].map((_,i) => g.map(row => row[i]).reverse());
}

function move(dir) {
  const before = JSON.stringify(grid);
  let times = {left:0, up:1, right:2, down:3}[dir];
  for (let i=0;i<times;i++) grid = rotate(grid);
  grid = grid.map(slide);
  for (let i=0;i<(4-times)%4;i++) grid = rotate(grid);

  if (JSON.stringify(grid) !== before) {
    const pos = addTile();
    draw(pos);
    if (isOver()) { msgText.textContent = 'Game Over'; msgEl.classList.add('show'); }
  }
}

function isOver() {
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    if (!grid[r][c]) return false;
    if (c<3 && grid[r][c]===grid[r][c+1]) return false;
    if (r<3 && grid[r][c]===grid[r+1][c]) return false;
  }
  return true;
}

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let sx=0, sy=0;
document.addEventListener('touchstart', e => {
  sx = e.touches[0].clientX; sy = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
}, {passive:true});

document.getElementById('restart').addEventListener('click', init);

init();
</script>

</body>
</html>
