<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>zerics — Fight</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background:#0a0a0a; color:#e8e8e8;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:.8rem;
    user-select:none; touch-action:none; padding:.5rem; overflow:hidden;
  }
  .top { width:min(100%,900px); display:flex; justify-content:space-between; align-items:center; }
  .top a { color:#666; text-decoration:none; font-size:.9rem; letter-spacing:.2em; text-transform:uppercase; }

  #hud { width:min(100%,900px); display:flex; gap:1rem; align-items:center; }
  .bar { flex:1; }
  .bar .name { font-size:.75rem; color:#888; text-transform:uppercase; letter-spacing:.1em; margin-bottom:.2rem; }
  .bar .track { height:16px; background:#222; border-radius:8px; overflow:hidden; }
  .bar .fill { height:100%; background:linear-gradient(90deg,#3fa34d,#7ac74f); transition:width .2s; }
  .bar.r .name { text-align:right; }
  .bar.r .track { transform:scaleX(-1); }
  .bar .fill.low { background:linear-gradient(90deg,#a33418,#d4542a); }
  #timer { font-size:1.6rem; font-weight:700; font-variant-numeric:tabular-nums; min-width:60px; text-align:center; }

  #stage {
    position:relative; width:min(100%,900px); aspect-ratio:16/9;
    background:linear-gradient(180deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
    border:1px solid #262626; border-radius:12px; overflow:hidden;
  }
  #ground { position:absolute; left:0; right:0; bottom:0; height:18%; background:#0d0d1a; border-top:2px solid #2a2a3a; }

  .fighter { position:absolute; bottom:18%; width:14%; transition:none; }
  .fighter .head {
    width:100%; aspect-ratio:1; border-radius:50%;
    background-size:cover; background-position:center;
    border:3px solid #444; box-shadow:0 4px 12px #0008;
  }
  .fighter .body {
    width:60%; height:0; margin:0 auto; border-left:8px solid #666; border-right:8px solid #666;
    height:2.2vw; min-height:18px;
  }
  .fighter.hit .head { border-color:#e04a2a; filter:brightness(1.6); }
  .fighter.blocking .head { border-color:#4a90d9; }

  .proj { position:absolute; font-size:2rem; line-height:1; }
  .fx {
    position:absolute; font-weight:900; color:#fff; text-shadow:0 0 10px #000;
    pointer-events:none; animation:float .8s ease-out forwards;
  }
  @keyframes float { to { transform:translateY(-40px); opacity:0; } }

  #ahmed {
    position:absolute; left:50%; top:35%; transform:translate(-50%,-50%) scale(0);
    width:22%; text-align:center; pointer-events:none;
  }
  #ahmed img { width:100%; border-radius:50%; border:4px solid #d4a017; box-shadow:0 0 40px #d4a017; }
  #ahmed .say {
    margin-top:.4rem; background:#d4a017; color:#000; font-weight:800;
    font-size:clamp(.5rem,1.3vw,.9rem); padding:.3rem .5rem; border-radius:6px;
  }
  #ahmed.show { animation:ahmed 2.4s ease-out forwards; }
  @keyframes ahmed {
    0% { transform:translate(-50%,-50%) scale(0) rotate(-20deg); }
    15% { transform:translate(-50%,-50%) scale(1.15) rotate(5deg); }
    25% { transform:translate(-50%,-50%) scale(1) rotate(0); }
    80% { transform:translate(-50%,-50%) scale(1); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(.8); opacity:0; }
  }

  #stage.shake { animation:shake .4s; }
  @keyframes shake {
    0%,100% { transform:translate(0,0); }
    20% { transform:translate(-8px,4px); }
    40% { transform:translate(8px,-4px); }
    60% { transform:translate(-6px,-3px); }
    80% { transform:translate(6px,3px); }
  }

  #overlay {
    position:absolute; inset:0; background:#0a0a0ae6;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem;
  }
  #overlay.hidden { display:none; }
  #overlay h2 { font-size:clamp(1.5rem,5vw,3rem); text-align:center; }
  button {
    background:#e8e8e8; color:#0a0a0a; border:none; border-radius:8px;
    padding:.7rem 1.5rem; font-size:1rem; font-weight:700; cursor:pointer; font-family:inherit;
  }

  .meter { display:flex; gap:3px; margin-top:.3rem; }
  .meter i { flex:1; height:5px; background:#333; border-radius:2px; }
  .meter i.on { background:#d4a017; }
  .bar.r .meter { flex-direction:row-reverse; }

  #keys { width:min(100%,900px); display:flex; justify-content:space-between; color:#555; font-size:.7rem; }
  #keys div { line-height:1.5; }
  .mob { display:none; }
  @media (max-width:700px) {
    #keys { display:none; }
    .mob { display:flex; width:min(100%,900px); justify-content:space-between; gap:.5rem; }
    .pad { display:flex; gap:.3rem; }
    .pad button { padding:.8rem .7rem; font-size:.8rem; border-radius:6px; background:#242424; color:#ddd; }
    .pad button.sp { background:#d4a017; color:#000; }
  }
</style>
</head>
<body>

<div class="top">
  <a href="/">← zerics</a>
  <span style="color:#666;font-size:.8rem">Erster auf 0 verliert</span>
</div>

<div id="hud">
  <div class="bar" id="bar1">
    <div class="name">Alex</div>
    <div class="track"><div class="fill" id="hp1" style="width:100%"></div></div>
    <div class="meter" id="m1"><i></i><i></i><i></i></div>
  </div>
  <div id="timer">60</div>
  <div class="bar r" id="bar2">
    <div class="name">Yessin</div>
    <div class="track"><div class="fill" id="hp2" style="width:100%"></div></div>
    <div class="meter" id="m2"><i></i><i></i><i></i></div>
  </div>
</div>

<div id="stage">
  <div id="ground"></div>

  <div class="fighter" id="f1">
    <div class="head" style="background-image:url('/alex.png')"></div>
    <div class="body"></div>
  </div>

  <div class="fighter" id="f2">
    <div class="head" style="background-image:url('/yessin.png')"></div>
    <div class="body"></div>
  </div>

  <div id="ahmed">
    <img src="/ahmed.png" alt="">
    <div class="say">HABT IHR EINEN PERSONALAUSWEIS DABEI?!</div>
  </div>

  <div id="overlay">
    <h2 id="ovText">ALEX vs YESSIN</h2>
    <button id="start">Kampf starten</button>
  </div>
</div>

<div id="keys">
  <div><b style="color:#888">ALEX</b><br>A / D — laufen · W — springen<br>S — blocken · F — schlagen · G — <b style="color:#d4a017">KANU</b></div>
  <div style="text-align:right"><b style="color:#888">YESSIN</b><br>← / → — laufen · ↑ — springen<br>↓ — blocken · , — schlagen · . — <b style="color:#d4a017">AUTOMAT</b></div>
</div>

<div class="mob">
  <div class="pad">
    <button data-k="a">◀</button><button data-k="w">▲</button><button data-k="d">▶</button>
    <button data-k="f">👊</button><button data-k="g" class="sp">🛶</button>
  </div>
  <div class="pad">
    <button data-k="ArrowLeft">◀</button><button data-k="ArrowUp">▲</button><button data-k="ArrowRight">▶</button>
    <button data-k=",">👊</button><button data-k="." class="sp">🎰</button>
  </div>
</div>

<script>
const stage = document.getElementById('stage');
const overlay = document.getElementById('overlay');
const ovText = document.getElementById('ovText');
const ahmedEl = document.getElementById('ahmed');
const timerEl = document.getElementById('timer');

const GRAV = 0.6, JUMP = -13, SPEED = 0.55;

function mkFighter(id, dir, keys) {
  return {
    el: document.getElementById(id),
    x: dir > 0 ? 15 : 71, y: 0, vy: 0,
    dir, hp: 100, meter: 0, keys,
    onGround: true, blocking: false, cool: 0, spCool: 0,
  };
}

let p1, p2, projectiles = [], running = false, timeLeft = 60, timerId = null;
const pressed = {};

function reset() {
  p1 = mkFighter('f1', 1, { l:'a', r:'d', u:'w', d:'s', atk:'f', sp:'g' });
  p2 = mkFighter('f2', -1, { l:'ArrowLeft', r:'ArrowRight', u:'ArrowUp', d:'ArrowDown', atk:',', sp:'.' });
  projectiles.forEach(pr => pr.el.remove());
  projectiles = [];
  timeLeft = 60;
  updateHUD();
}

function updateHUD() {
  [[p1,'hp1','m1'],[p2,'hp2','m2']].forEach(([p,hp,m]) => {
    const el = document.getElementById(hp);
    el.style.width = Math.max(0,p.hp) + '%';
    el.classList.toggle('low', p.hp <= 30);
    document.getElementById(m).querySelectorAll('i').forEach((i,idx) =>
      i.classList.toggle('on', idx < p.meter));
  });
  timerEl.textContent = timeLeft;
}

function fx(text, xPct, yPct, color) {
  const d = document.createElement('div');
  d.className = 'fx';
  d.textContent = text;
  d.style.left = xPct + '%';
  d.style.top = yPct + '%';
  if (color) d.style.color = color;
  stage.appendChild(d);
  setTimeout(() => d.remove(), 800);
}

function damage(target, amount, attacker) {
  if (target.blocking) { amount = Math.round(amount * 0.25); fx('BLOCK', target.x, 40, '#4a90d9'); }
  else fx('-' + amount, target.x, 35);
  target.hp -= amount;
  target.el.classList.add('hit');
  setTimeout(() => target.el.classList.remove('hit'), 150);
  target.x += attacker.dir * 3;
  attacker.meter = Math.min(3, attacker.meter + 1);
  updateHUD();
  if (target.hp <= 0) endGame(attacker === p1 ? 'ALEX GEWINNT' : 'YESSIN GEWINNT');
}

function punch(p, o) {
  if (p.cool > 0) return;
  p.cool = 22;
  const dist = Math.abs(p.x - o.x);
  if (dist < 18 && Math.abs(p.y - o.y) < 40) damage(o, 7, p);
  else fx('woosh', p.x + p.dir * 8, 40, '#555');
}

function special(p, o) {
  if (p.meter < 3 || p.spCool > 0) return;
  p.meter = 0; p.spCool = 60;
  const el = document.createElement('div');
  el.className = 'proj';
  el.textContent = p === p1 ? '🛶' : '🎰';
  el.style.left = p.x + '%';
  el.style.bottom = '30%';
  stage.appendChild(el);
  projectiles.push({ el, x: p.x, dir: p.dir, owner: p, target: o, dmg: 18 });
  fx(p === p1 ? 'KANU!' : 'AUTOMAT!', p.x, 25, '#d4a017');
  updateHUD();
}

function ahmedRaid() {
  ahmedEl.classList.remove('show');
  void ahmedEl.offsetWidth;
  ahmedEl.classList.add('show');
  stage.classList.add('shake');
  setTimeout(() => stage.classList.remove('shake'), 400);
  setTimeout(() => {
    [p1,p2].forEach(p => {
      p.hp -= 6;
      p.x += p === p1 ? -6 : 6;
      p.vy = -8; p.onGround = false;
      p.el.classList.add('hit');
      setTimeout(() => p.el.classList.remove('hit'), 200);
    });
    updateHUD();
    if (p1.hp <= 0 && p2.hp <= 0) endGame('AHMED GEWINNT');
    else if (p1.hp <= 0) endGame('YESSIN GEWINNT');
    else if (p2.hp <= 0) endGame('ALEX GEWINNT');
  }, 400);
}

function step(p, o) {
  if (pressed[p.keys.l]) p.x -= SPEED;
  if (pressed[p.keys.r]) p.x += SPEED;
  p.blocking = !!pressed[p.keys.d] && p.onGround;
  p.el.classList.toggle('blocking', p.blocking);

  if (pressed[p.keys.u] && p.onGround) { p.vy = JUMP; p.onGround = false; }
  if (pressed[p.keys.atk]) punch(p, o);
  if (pressed[p.keys.sp]) special(p, o);

  p.vy += GRAV;
  p.y -= p.vy;
  if (p.y <= 0) { p.y = 0; p.vy = 0; p.onGround = true; }

  p.x = Math.max(1, Math.min(85, p.x));
  p.dir = p.x < o.x ? 1 : -1;
  if (p.cool > 0) p.cool--;
  if (p.spCool > 0) p.spCool--;

  p.el.style.left = p.x + '%';
  p.el.style.bottom = (18 + p.y / 6) + '%';
  p.el.querySelector('.head').style.transform = 'scaleX(' + p.dir + ')';
}

function loop() {
  if (!running) return;
  step(p1, p2);
  step(p2, p1);

  projectiles.forEach((pr, i) => {
    pr.x += pr.dir * 1.4;
    pr.el.style.left = pr.x + '%';
    if (Math.abs(pr.x - pr.target.x) < 8) {
      damage(pr.target, pr.dmg, pr.owner);
      pr.el.remove(); projectiles.splice(i,1);
    } else if (pr.x < -5 || pr.x > 100) {
      pr.el.remove(); projectiles.splice(i,1);
    }
  });

  requestAnimationFrame(loop);
}

function endGame(text) {
  running = false;
  clearInterval(timerId);
  ovText.textContent = text;
  overlay.classList.remove('hidden');
  document.getElementById('start').textContent = 'Nochmal';
}

function start() {
  reset();
  overlay.classList.add('hidden');
  running = true;
  loop();
  timerId = setInterval(() => {
    timeLeft--;
    updateHUD();
    if (timeLeft === 40 || timeLeft === 20) ahmedRaid();
    if (timeLeft <= 0) {
      if (p1.hp > p2.hp) endGame('ALEX GEWINNT');
      else if (p2.hp > p1.hp) endGame('YESSIN GEWINNT');
      else endGame('UNENTSCHIEDEN');
    }
  }, 1000);
}

document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  pressed[e.key] = true;
});
document.addEventListener('keyup', e => { pressed[e.key] = false; });

document.querySelectorAll('.pad button').forEach(b => {
  const k = b.dataset.k;
  b.addEventListener('pointerdown', e => { e.preventDefault(); pressed[k] = true; });
  b.addEventListener('pointerup', () => pressed[k] = false);
  b.addEventListener('pointerleave', () => pressed[k] = false);
});

document.getElementById('start').addEventListener('click', start);
reset();
</script>

</body>
</html>
