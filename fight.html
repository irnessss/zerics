<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>zerics — Fight</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background:#0a0a0a; color:#e8e8e8;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:.8rem;
    user-select:none; touch-action:none; padding:.5rem;
  }
  .top { width:min(100%,900px); display:flex; justify-content:space-between; align-items:center; }
  .top a { color:#666; text-decoration:none; font-size:.9rem; letter-spacing:.2em; text-transform:uppercase; }

  #hud { width:min(100%,900px); display:flex; gap:1rem; align-items:center; }
  .bar { flex:1; }
  .bar .name { font-size:.75rem; color:#888; text-transform:uppercase; letter-spacing:.1em; margin-bottom:.2rem; }
  .bar .track { height:16px; background:#222; border-radius:8px; overflow:hidden; }
  .bar .fill { height:100%; background:linear-gradient(90deg,#3fa34d,#7ac74f); transition:width .2s; }
  .bar.r .name { text-align:right; }
  .bar.r .track { transform:scaleX(-1); }
  .bar .fill.low { background:linear-gradient(90deg,#a33418,#d4542a); }
  #timer { font-size:1.6rem; font-weight:700; font-variant-numeric:tabular-nums; min-width:60px; text-align:center; }
  .meter { display:flex; gap:3px; margin-top:.3rem; }
  .meter i { flex:1; height:6px; background:#333; border-radius:2px; transition:background .15s; }
  .meter i.on { background:#d4a017; }
  .bar.r .meter { flex-direction:row-reverse; }

  #stage {
    position:relative; width:min(100%,900px); aspect-ratio:16/9;
    background:linear-gradient(180deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
    border:1px solid #262626; border-radius:12px; overflow:hidden;
  }
  #ground { position:absolute; left:0; right:0; bottom:0; height:18%; background:#0d0d1a; border-top:2px solid #2a2a3a; }

  .fighter { position:absolute; bottom:18%; width:14%; }
  .fighter .head {
    width:100%; aspect-ratio:1; border-radius:50%;
    background-size:cover; background-position:center;
    border:3px solid #444; box-shadow:0 4px 12px #0008;
  }
  .fighter .body {
    width:60%; margin:0 auto; border-left:8px solid #666; border-right:8px solid #666;
    height:2.2vw; min-height:18px;
  }
  .fighter.hit .head { border-color:#e04a2a; filter:brightness(1.6); }
  .fighter.ready .head { box-shadow:0 0 18px #d4a017, 0 4px 12px #0008; }

  .proj { position:absolute; font-size:2.4rem; line-height:1; }
  .fx {
    position:absolute; font-weight:900; color:#fff; text-shadow:0 0 10px #000;
    pointer-events:none; animation:float .8s ease-out forwards; font-size:clamp(.8rem,2vw,1.2rem);
  }
  @keyframes float { to { transform:translateY(-40px); opacity:0; } }

  #warn {
    position:absolute; top:8%; left:50%; transform:translateX(-50%);
    background:#d4a017; color:#000; font-weight:900; font-size:clamp(.6rem,1.5vw,1rem);
    padding:.3rem .8rem; border-radius:6px; opacity:0; pointer-events:none;
  }
  #warn.show { animation:blink 1s ease-out; }
  @keyframes blink { 0%,100%{opacity:0} 25%,75%{opacity:1} }

  #ahmed {
    position:absolute; left:50%; top:35%; transform:translate(-50%,-50%) scale(0);
    width:22%; text-align:center; pointer-events:none;
  }
  #ahmed img { width:100%; border-radius:50%; border:4px solid #d4a017; box-shadow:0 0 40px #d4a017; }
  #ahmed .say {
    margin-top:.4rem; background:#d4a017; color:#000; font-weight:800;
    font-size:clamp(.45rem,1.2vw,.85rem); padding:.3rem .5rem; border-radius:6px;
  }
  #ahmed.show { animation:ahmed 2s ease-out forwards; }
  @keyframes ahmed {
    0% { transform:translate(-50%,-50%) scale(0) rotate(-20deg); }
    15% { transform:translate(-50%,-50%) scale(1.15) rotate(5deg); }
    25% { transform:translate(-50%,-50%) scale(1) rotate(0); }
    80% { transform:translate(-50%,-50%) scale(1); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(.8); opacity:0; }
  }

  #stage.shake { animation:shake .4s; }
  @keyframes shake {
    0%,100% { transform:translate(0,0); }
    20% { transform:translate(-8px,4px); }
    40% { transform:translate(8px,-4px); }
    60% { transform:translate(-6px,-3px); }
    80% { transform:translate(6px,3px); }
  }

  .screen {
    position:absolute; inset:0; background:#0a0a0af2;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem;
    padding:1rem; text-align:center;
  }
  .screen.hidden { display:none; }
  .screen h2 { font-size:clamp(1.1rem,3.5vw,2rem); }
  .screen .sub { color:#888; font-size:clamp(.7rem,1.8vw,.9rem); }

  .picks { display:flex; gap:1.5rem; }
  .pick { cursor:pointer; text-align:center; }
  .pick img {
    width:clamp(70px,14vw,120px); aspect-ratio:1; border-radius:50%;
    border:4px solid #333; object-fit:cover; transition:border-color .15s, transform .15s;
  }
  .pick:hover img { border-color:#d4a017; transform:scale(1.06); }
  .pick .n { margin-top:.5rem; font-weight:700; font-size:clamp(.8rem,2vw,1.1rem); }
  .pick .a { color:#777; font-size:clamp(.6rem,1.4vw,.8rem); }

  button {
    background:#e8e8e8; color:#0a0a0a; border:none; border-radius:8px;
    padding:.7rem 1.5rem; font-size:1rem; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .diffs { display:flex; gap:.5rem; }
  .diffs button { background:#242424; color:#ddd; }
  .diffs button.on { background:#d4a017; color:#000; }

  #ctrl {
    width:min(100%,900px); display:flex; justify-content:center; gap:.6rem;
  }
  #ctrl button {
    background:#242424; color:#ddd; padding:1.1rem 1.6rem; font-size:1.2rem; border-radius:10px;
  }
  #ctrl button:active { background:#3a3a3a; }
  #hint { color:#555; font-size:.75rem; text-align:center; }
</style>
</head>
<body>

<div class="top">
  <a href="/">← zerics</a>
  <span style="color:#666;font-size:.8rem">Erster auf 0 verliert</span>
</div>

<div id="hud">
  <div class="bar" id="bar1">
    <div class="name" id="n1">—</div>
    <div class="track"><div class="fill" id="hp1" style="width:100%"></div></div>
    <div class="meter" id="m1"><i></i><i></i></div>
  </div>
  <div id="timer">60</div>
  <div class="bar r" id="bar2">
    <div class="name" id="n2">—</div>
    <div class="track"><div class="fill" id="hp2" style="width:100%"></div></div>
    <div class="meter" id="m2"><i></i><i></i></div>
  </div>
</div>

<div id="stage">
  <div id="ground"></div>
  <div id="warn">⚠️ AHMED KOMMT</div>

  <div class="fighter" id="f1"><div class="head" id="h1"></div><div class="body"></div></div>
  <div class="fighter" id="f2"><div class="head" id="h2"></div><div class="body"></div></div>

  <div id="ahmed">
    <img src="/ahmed.png" alt="">
    <div class="say">HABT IHR EINEN PERSONALAUSWEIS DABEI?!</div>
  </div>

  <div class="screen" id="select">
    <h2>Wen spielst du?</h2>
    <div class="picks">
      <div class="pick" data-c="alex">
        <img src="/alex.png" alt="Alex">
        <div class="n">Alex</div>
        <div class="a">🛶 Kanu</div>
      </div>
      <div class="pick" data-c="yessin">
        <img src="/yessin.png" alt="Yessin">
        <div class="n">Yessin</div>
        <div class="a">🎰 Automat</div>
      </div>
    </div>
    <div class="diffs">
      <button data-d="easy">Leicht</button>
      <button data-d="normal" class="on">Normal</button>
      <button data-d="hard">Schwer</button>
    </div>
    <div class="sub">Ahmed mischt sich ein — und trifft beide.</div>
  </div>

  <div class="screen hidden" id="over">
    <h2 id="ovText"></h2>
    <button id="again">Nochmal</button>
  </div>
</div>

<div id="ctrl">
  <button data-k="l">◀</button>
  <button data-k="u">▲</button>
  <button data-k="r">▶</button>
  <button data-k="atk">👊</button>
</div>
<div id="hint">Tastatur: ← → zum Laufen · ↑ springen · Leertaste schlagen — Super feuert automatisch</div>

<script>
const stage = document.getElementById('stage');
const ahmedEl = document.getElementById('ahmed');
const warnEl = document.getElementById('warn');
const timerEl = document.getElementById('timer');
const selectEl = document.getElementById('select');
const overEl = document.getElementById('over');
const ovText = document.getElementById('ovText');

const CHARS = {
  alex:   { name:'Alex',   img:'/alex.png',   proj:'🛶', cry:'KANU!' },
  yessin: { name:'Yessin', img:'/yessin.png', proj:'🎰', cry:'AUTOMAT!' },
};

const DIFF = {
  easy:   { react:0.15, aggro:0.15, dmg:3, pause:70 },
  normal: { react:0.4,  aggro:0.35, dmg:5, pause:45 },
  hard:   { react:0.7,  aggro:0.6,  dmg:7, pause:25 },
};

const GRAV = 0.55, JUMP = -14, SPEED = 0.8;
const HIT_RANGE = 26, PUNCH_COOL = 14, METER_MAX = 2;

let player, ai, projectiles = [], running = false, timeLeft = 60;
let timerId = null, ahmedTid = null, diff = 'normal';
const pressed = {};

function mkFighter(elId, headId, char, dir, isAI) {
  return {
    el: document.getElementById(elId),
    head: document.getElementById(headId),
    char, x: dir > 0 ? 15 : 71, y: 0, vy: 0, dir,
    hp: 100, meter: 0, onGround: true, cool: 0, spCool: 0,
    isAI, think: 0, intent: 'idle',
  };
}

function setup(playerChar) {
  const aiChar = playerChar === 'alex' ? 'yessin' : 'alex';
  player = mkFighter('f1','h1', CHARS[playerChar], 1, false);
  ai     = mkFighter('f2','h2', CHARS[aiChar], -1, true);
  player.head.style.backgroundImage = `url('${CHARS[playerChar].img}')`;
  ai.head.style.backgroundImage     = `url('${CHARS[aiChar].img}')`;
  document.getElementById('n1').textContent = CHARS[playerChar].name + ' (du)';
  document.getElementById('n2').textContent = CHARS[aiChar].name;
  projectiles.forEach(p => p.el.remove());
  projectiles = [];
  timeLeft = 60;
  updateHUD();
}

function updateHUD() {
  [[player,'hp1','m1'],[ai,'hp2','m2']].forEach(([p,hp,m]) => {
    const el = document.getElementById(hp);
    el.style.width = Math.max(0,p.hp) + '%';
    el.classList.toggle('low', p.hp <= 30);
    document.getElementById(m).querySelectorAll('i').forEach((i,idx) =>
      i.classList.toggle('on', idx < Math.floor(p.meter)));
    p.el.classList.toggle('ready', p.meter >= METER_MAX);
  });
  timerEl.textContent = timeLeft;
}

function fx(text, xPct, yPct, color) {
  const d = document.createElement('div');
  d.className = 'fx'; d.textContent = text;
  d.style.left = xPct + '%'; d.style.top = yPct + '%';
  if (color) d.style.color = color;
  stage.appendChild(d);
  setTimeout(() => d.remove(), 800);
}

function damage(target, amount, attacker) {
  fx('-' + amount, target.x, 35);
  target.hp -= amount;
  target.el.classList.add('hit');
  setTimeout(() => target.el.classList.remove('hit'), 150);
  target.x = Math.max(1, Math.min(85, target.x + attacker.dir * 3));
  attacker.meter = Math.min(METER_MAX, attacker.meter + 1);
  updateHUD();
  checkDead();
}

function checkDead() {
  if (player.hp <= 0 && ai.hp <= 0) endGame('AHMED GEWINNT');
  else if (player.hp <= 0) endGame('VERLOREN');
  else if (ai.hp <= 0) endGame('GEWONNEN!');
}

function punch(p, o) {
  if (p.cool > 0) return;
  p.cool = PUNCH_COOL;
  const dmg = p.isAI ? DIFF[diff].dmg : 7;
  if (Math.abs(p.x - o.x) < HIT_RANGE && Math.abs(p.y - o.y) < 55) damage(o, dmg, p);
  else { fx('woosh', p.x + p.dir*8, 40, '#555'); p.meter = Math.min(METER_MAX, p.meter + 0.3); updateHUD(); }
}

function special(p, o) {
  if (p.meter < METER_MAX || p.spCool > 0) return;
  p.meter = 0; p.spCool = 50;
  const el = document.createElement('div');
  el.className = 'proj'; el.textContent = p.char.proj;
  el.style.left = p.x + '%'; el.style.bottom = '30%';
  stage.appendChild(el);
  projectiles.push({ el, x:p.x, dir:p.dir, owner:p, target:o, dmg:18 });
  fx(p.char.cry, p.x, 25, '#d4a017');
  updateHUD();
}

function aiThink() {
  const d = DIFF[diff];
  const dist = Math.abs(ai.x - player.x);

  if (ai.meter >= METER_MAX && ai.spCool <= 0 && Math.random() < d.react * 0.15) {
    special(ai, player); return;
  }
  if (ai.think > 0) { ai.think--; return; }
  ai.think = DIFF[diff].pause + Math.random()*30;

  const incoming = projectiles.some(pr => pr.owner === player && Math.abs(pr.x - ai.x) < 30);
  if (incoming && Math.random() < d.react) { ai.intent = 'jump'; return; }

  if (dist > HIT_RANGE + 4) ai.intent = Math.random() < d.aggro ? 'approach' : 'idle';
  else ai.intent = Math.random() < d.aggro ? 'attack' : 'back';
}

function stepAI() {
  aiThink();
  const dist = Math.abs(ai.x - player.x);
  if (ai.intent === 'approach') ai.x += ai.dir * SPEED * 0.75;
  else if (ai.intent === 'back') ai.x -= ai.dir * SPEED * 0.6;
  else if (ai.intent === 'jump' && ai.onGround) { ai.vy = JUMP; ai.onGround = false; ai.intent = 'idle'; }
  else if (ai.intent === 'attack' && dist < HIT_RANGE) punch(ai, player);
  physics(ai, player);
}

function stepPlayer() {
  if (pressed.l) player.x -= SPEED;
  if (pressed.r) player.x += SPEED;
  if (pressed.u && player.onGround) { player.vy = JUMP; player.onGround = false; }
  if (pressed.atk) punch(player, ai);
  if (player.meter >= METER_MAX && player.spCool <= 0) special(player, ai);
  physics(player, ai);
}

function physics(p, o) {
  p.vy += GRAV; p.y -= p.vy;
  if (p.y <= 0) { p.y = 0; p.vy = 0; p.onGround = true; }
  p.x = Math.max(1, Math.min(85, p.x));
  p.dir = p.x < o.x ? 1 : -1;
  if (p.cool > 0) p.cool--;
  if (p.spCool > 0) p.spCool--;
  p.el.style.left = p.x + '%';
  p.el.style.bottom = (18 + p.y/6) + '%';
  p.head.style.transform = 'scaleX(' + p.dir + ')';
}

function ahmedRaid() {
  if (!running) return;
  warnEl.classList.remove('show'); void warnEl.offsetWidth; warnEl.classList.add('show');
  setTimeout(() => {
    if (!running) return;
    ahmedEl.classList.remove('show'); void ahmedEl.offsetWidth; ahmedEl.classList.add('show');
    stage.classList.add('shake');
    setTimeout(() => stage.classList.remove('shake'), 400);
    setTimeout(() => {
      if (!running) return;
      [player, ai].forEach(p => {
        p.hp -= 8;
        p.x = Math.max(1, Math.min(85, p.x + (p === player ? -6 : 6)));
        p.vy = -8; p.onGround = false;
        p.el.classList.add('hit');
        setTimeout(() => p.el.classList.remove('hit'), 200);
      });
      fx('AUSWEIS!', 42, 50, '#d4a017');
      updateHUD(); checkDead();
    }, 400);
  }, 1000);
  scheduleAhmed();
}

function scheduleAhmed() {
  clearTimeout(ahmedTid);
  ahmedTid = setTimeout(ahmedRaid, 8000 + Math.random()*5000);
}

function loop() {
  if (!running) return;
  stepPlayer(); stepAI();
  projectiles.forEach((pr,i) => {
    pr.x += pr.dir * 1.5;
    pr.el.style.left = pr.x + '%';
    if (Math.abs(pr.x - pr.target.x) < 9 && pr.target.y < 40) {
      damage(pr.target, pr.dmg, pr.owner);
      pr.el.remove(); projectiles.splice(i,1);
    } else if (pr.x < -5 || pr.x > 100) { pr.el.remove(); projectiles.splice(i,1); }
  });
  requestAnimationFrame(loop);
}

function endGame(text) {
  running = false;
  clearInterval(timerId); clearTimeout(ahmedTid);
  ovText.textContent = text;
  overEl.classList.remove('hidden');
}

function start(charKey) {
  setup(charKey);
  selectEl.classList.add('hidden');
  overEl.classList.add('hidden');
  running = true;
  loop();
  scheduleAhmed();
  timerId = setInterval(() => {
    timeLeft--; updateHUD();
    if (timeLeft <= 0) {
      if (player.hp > ai.hp) endGame('GEWONNEN!');
      else if (ai.hp > player.hp) endGame('VERLOREN');
      else endGame('UNENTSCHIEDEN');
    }
  }, 1000);
}

let chosen = null;
document.querySelectorAll('.pick').forEach(el =>
  el.addEventListener('click', () => { chosen = el.dataset.c; start(chosen); }));

document.querySelectorAll('.diffs button').forEach(b =>
  b.addEventListener('click', () => {
    diff = b.dataset.d;
    document.querySelectorAll('.diffs button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
  }));

document.getElementById('again').addEventListener('click', () => {
  overEl.classList.add('hidden');
  selectEl.classList.remove('hidden');
});

const KEYMAP = { ArrowLeft:'l', ArrowRight:'r', ArrowUp:'u', ' ':'atk', a:'l', d:'r', w:'u' };
document.addEventListener('keydown', e => {
  const k = KEYMAP[e.key];
  if (k) { e.preventDefault(); pressed[k] = true; }
});
document.addEventListener('keyup', e => {
  const k = KEYMAP[e.key];
  if (k) pressed[k] = false;
});

document.querySelectorAll('#ctrl button').forEach(b => {
  const k = b.dataset.k;
  b.addEventListener('pointerdown', e => { e.preventDefault(); pressed[k] = true; });
  b.addEventListener('pointerup', () => pressed[k] = false);
  b.addEventListener('pointerleave', () => pressed[k] = false);
  b.addEventListener('pointercancel', () => pressed[k] = false);
});
</script>

</body>
</html>
